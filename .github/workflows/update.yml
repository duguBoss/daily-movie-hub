name: Update Daily Movie

on:
  schedule:
    # 每天 UTC 时间 12:00 运行 (对应北京时间 20:00)
    # 注意：之前的注释写错了，UTC 12:00 是北京时间晚上 8 点
    - cron: '0 12 * * *'
  workflow_dispatch: # 允许手动点击 "Run workflow" 按钮立即运行

# 赋予 GITHUB_TOKEN 写入仓库内容的权限，防止 Push 失败
permissions:
  contents: write

jobs:
  update-content:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install Dependencies
        # 这里必须安装 python 脚本中用到的所有第三方库
        # requests 用于 API 请求，beautifulsoup4 用于备用爬虫，wikipedia 用于备用百科
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 wikipedia

      - name: Fetch Data and Images
        env:
          # 必须传递 TMDB Key
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          
          # 👇👇👇 必须增加这行，否则 Python 脚本读不到 Gemini Key！
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
          # 可选：如果你想指定模型 (默认用代码里的 gemini-2.0-flash-exp)
          # GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          
        # 你的 Python 脚本名是 fetch_daily.py 吗？如果是 main.py 请自行修改
        run: python fetch_daily.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 添加 data 文件夹下的所有变动 (包含 json 和 images)
          git add data/
          
          # 检查是否有变动，如果有则提交，没有则退出且不报错
          git commit -m "Update daily movie content: $(date +'%Y-%m-%d') [skip ci]" || echo "No changes to commit"
          
          git push
